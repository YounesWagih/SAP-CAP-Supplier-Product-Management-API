_schema-version: "3.1"
ID: cap-task
version: 1.0.0
description: SAP CAP project with Node.js/TypeScript and SQLite
parameters:
    enable-parallel-deployments: true

modules:
    - name: cap-task-srv
      type: nodejs
      path: .
      requires:
          - name: cap-task-db
      provides:
          - name: srv-api
            properties:
                srv-url: "${default-url}"
      buildpack: nodejs_buildpack
      parameters:
          disk-quota: 1024M
          memory: 256M

    - name: cap-task-db-deployer
      type: nodejs
      path: db/
      requires:
          - name: cap-task-db
      buildpack: nodejs_buildpack
      parameters:
          disk-quota: 512M
          memory: 128M

resources:
    - name: cap-task-db
      type: com.sap.xs.sqlite
      properties:
          path: ./sqlite.db
